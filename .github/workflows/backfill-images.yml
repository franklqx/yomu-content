name: Backfill images

on:
  workflow_dispatch:
    inputs:
      force:
        description: "强制重抓所有图（覆盖已有，去重复用）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: backfill-images
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Backfill images
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOMU_REBACKFILL: ${{ inputs.force }}
        run: python scripts/backfill_images.py

      - name: Commit & push
        run: |
          set -e
          git config user.name "yomu-bot"
          git config user.email "yomu-bot@users.noreply.github.com"
          git add articles/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No images backfilled; nothing to commit"
            exit 0
          fi
          git commit -m "🖼️ Backfill images for existing articles"
          git push
